services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: codelens-postgres
    environment:
      POSTGRES_USER: codelens
      POSTGRES_PASSWORD: codelens_dev_password
      POSTGRES_DB: codelens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codelens"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
